services:
  - type: web
    name: repogenius-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WORKSPACE_DIR
        value: /tmp/workspace
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: "3.11"
